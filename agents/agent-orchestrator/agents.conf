# agents.conf — Agent registry + orchestrator configuration
#
# Every section = one agent. The dashboard discovers agents from here.
# No code changes needed to add/remove agents — edit this file only.
#
# ── Path variables ────────────────────────────────────────────────────────────
#   {WORKSPACE_ROOT}  →  root of the myworkspace directory
#   {AGENTS_DIR}      →  agents/ directory (parent of agent-orchestrator/)
#   {AGENT_DIR}       →  agent-orchestrator/ directory
#
# ── Standard fields ───────────────────────────────────────────────────────────
#   name, description       — display info for the dashboard
#   home                    — agent root directory (used for process detection)
#   start_script            — bash script to start the agent (relative to home)
#   stop_script             — bash script to stop the agent
#   health_script           — bash script for health check
#   log_file                — file to tail in the dashboard log viewer
#   memory_dir              — directory shown in the dashboard memory panel
#
# ── Orchestrator fields ───────────────────────────────────────────────────────
#   capabilities            — what this agent can do (shown to orchestrator LLM for routing)
#   connector               — how to dispatch tasks: direct | http | subprocess | orchestrator | none
#   connector_module        — (direct only)     dotted Python module path, e.g. workspace.agent
#   api_url                 — (http only)        base URL, e.g. http://localhost:8002
#   connector_cmd           — (subprocess only)  command relative to home, e.g. .venv/bin/python agent.py


# ── Orchestrator (built into this process — always running) ───────────────────
[orchestrator]
name         = Orchestrator
description  = Routes tasks to specialized agents. Use for multi-step or cross-agent tasks.
connector    = orchestrator
log_file     = {AGENT_DIR}/logs/server.log
memory_dir   = {AGENT_DIR}/memory


# ── Workspace Agent ───────────────────────────────────────────────────────────
[workspace]
name             = Workspace Agent
description      = Monitors workspace structure, git history, and project conventions
capabilities     = run Linux shell commands, fix and write files, read git history and status,
                   run health check scripts, diagnose broken scripts, send email notifications,
                   scan workspace directory structure, update agent memory
connector        = direct
connector_module = workspace.agent
home             = {AGENTS_DIR}/workspace-agent
start_script     = start_daemon.sh
stop_script      = stop.sh
health_script    = health.sh
log_file         = {AGENTS_DIR}/workspace-agent/workspace/memory/daemon.log
memory_dir       = {AGENTS_DIR}/workspace-agent/workspace/memory


# ── Claude Test Agent ─────────────────────────────────────────────────────────
[claude-test]
name          = Claude Test Agent
description   = Tests UMS REST API endpoints via HTTP
capabilities  = test UMS REST API endpoints, validate HTTP responses, check API health and availability
connector     = subprocess
connector_cmd = .venv/bin/python workspace/agent.py
home          = {WORKSPACE_ROOT}/projectspace/ai-agents/claude-agent/host
start_script  = start_daemon.sh
stop_script   = stop.sh
health_script = health.sh


# ── Docker Orchestrator Agent ─────────────────────────────────────────────────
[docker]
name          = Docker Manager Agent
description   = Monitors all Docker containers, auto-restarts stopped ones, logs events to SQLite
capabilities  = list all docker containers with status and stats, get CPU and memory usage per container,
                read container logs, restart stopped containers, query container event history,
                check which containers went down and when, report docker system health
connector     = http
api_url       = http://localhost:8889
home          = {AGENTS_DIR}/docker-manager-agent
start_script  = start.sh
stop_script   = stop.sh
health_script = health.sh
log_file      = {AGENTS_DIR}/docker-manager-agent/docker_agent/memory/server.log
memory_dir    = {AGENTS_DIR}/docker-manager-agent/docker_agent/memory


# ── How to add a new agent ────────────────────────────────────────────────────
# [my-agent]
# name             = My Agent
# description      = What it does
# capabilities     = list the things it can do so the orchestrator can route to it
# connector        = http                          # or direct / subprocess
# api_url          = http://localhost:8003         # (http connector)
# home             = {AGENTS_DIR}/my-agent
# start_script     = start.sh
# stop_script      = stop.sh
# health_script    = health.sh
# log_file         = {AGENTS_DIR}/my-agent/logs/agent.log
# memory_dir       = {AGENTS_DIR}/my-agent/memory
