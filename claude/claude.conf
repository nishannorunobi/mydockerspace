#!/bin/bash
# claude.conf — Claude Code CLI configuration.
# Sourced by claude_cli.sh (host and container).

# true  — installs Node.js and @anthropic-ai/claude-code inside the container
# false — skip
INSTALL_CLAUDE_CLI=true

# true  — copies host ~/.claude into claude/.claude-config/ on first run (host only)
#          container always symlinks to the shared dir — same context, no re-auth
# false — skip copy; set to true only once to migrate your existing ~/.claude
COPY_CLAUDE_CONFIG=false

NODE_VERSION="latest"
